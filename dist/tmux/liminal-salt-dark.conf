# Liminal Salt Dark — tmux
# https://github.com/irvj/liminal-salt
#
# Usage: add to your tmux.conf:
#   source-file ~/.config/tmux/liminal-salt-dark.conf

# Default terminal colors
set -g default-terminal "tmux-256color"

# Pane borders
set -g pane-border-style "fg=#2e312f"
set -g pane-active-border-style "fg=#8fac98"

# Status bar
set -g status-style "bg=#242726,fg=#e8e4dc"
set -g status-left-style "bg=#8fac98,fg=#1a1c1b,bold"
set -g status-right-style "bg=#242726,fg=#9e9b93"
set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "
set -g status-left-length 20

# Window status
set -g window-status-style "bg=#242726,fg=#9e9b93"
set -g window-status-current-style "bg=#1a1c1b,fg=#e8e4dc,bold"
set -g window-status-activity-style "bg=#242726,fg=#c9a86c"
set -g window-status-bell-style "bg=#242726,fg=#cc8585"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator ""

# Message / command prompt
set -g message-style "bg=#242726,fg=#e8e4dc"
set -g message-command-style "bg=#242726,fg=#e8e4dc"

# Copy mode
set -g mode-style "bg=#3d4741,fg=#e8e4dc"

# Clock
set -g clock-mode-colour "#8fac98"

# Display pane numbers
set -g display-panes-active-colour "#8fac98"
set -g display-panes-colour "#9e9b93"
