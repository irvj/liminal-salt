# Liminal Salt Light — tmux
# https://github.com/irvj/liminal-salt
#
# Usage: add to your tmux.conf:
#   source-file ~/.config/tmux/liminal-salt-light.conf

# Default terminal colors
set -g default-terminal "tmux-256color"

# Pane borders
set -g pane-border-style "fg=#ddd8d0"
set -g pane-active-border-style "fg=#506e58"

# Status bar
set -g status-style "bg=#fdfcfa,fg=#2d2b28"
set -g status-left-style "bg=#506e58,fg=#f5f2ed,bold"
set -g status-right-style "bg=#fdfcfa,fg=#6b6762"
set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "
set -g status-left-length 20

# Window status
set -g window-status-style "bg=#fdfcfa,fg=#6b6762"
set -g window-status-current-style "bg=#f5f2ed,fg=#2d2b28,bold"
set -g window-status-activity-style "bg=#fdfcfa,fg=#7d6325"
set -g window-status-bell-style "bg=#fdfcfa,fg=#a54d4d"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator ""

# Message / command prompt
set -g message-style "bg=#fdfcfa,fg=#2d2b28"
set -g message-command-style "bg=#fdfcfa,fg=#2d2b28"

# Copy mode
set -g mode-style "bg=#c4cac0,fg=#2d2b28"

# Clock
set -g clock-mode-colour "#506e58"

# Display pane numbers
set -g display-panes-active-colour "#506e58"
set -g display-panes-colour "#6b6762"
