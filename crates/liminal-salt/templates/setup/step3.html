{% extends "base.html" %}

{% block body %}
    <div class="max-w-xl mx-auto mt-12 p-5">
        <h1 class="text-foreground text-2xl mb-4">Welcome to Liminal Salt</h1>

        <div class="bg-surface-secondary border border-border rounded p-5 mb-3 prose prose-invert max-w-none text-sm">
            {{ agreement_body | markdown | safe }}
        </div>

        <p class="text-xs text-foreground-muted mb-5">Version {{ agreement_version }}</p>

        <form method="POST">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
            <div class="flex gap-3">
                {% if can_go_back %}
                <button type="submit"
                        name="setup_action"
                        value="back"
                        tabindex="0"
                        class="px-6 py-3 bg-border text-foreground rounded font-medium cursor-pointer hover:bg-accent hover:text-foreground-on-accent">
                    Back
                </button>
                {% endif %}
                <button type="submit"
                        name="setup_action"
                        value="accept"
                        tabindex="0"
                        class="px-6 py-3 bg-accent text-foreground-on-accent rounded font-medium cursor-pointer hover:bg-accent-hover">
                    I Agree &amp; Continue
                </button>
            </div>
        </form>
    </div>
{% endblock body %}
