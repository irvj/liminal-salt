<!-- Directory Browser Modal (nested inside context files modal) -->
<div x-show="dirBrowser.show"
     class="fixed inset-0 bg-black/60 flex items-center justify-center z-modal-nested"
     @click.self="dirBrowser.show = false">
    <div class="bg-surface-secondary rounded-lg p-6 max-w-[500px] w-[90%] border border-border">
        <h2 class="text-foreground mb-2">Browse Directories</h2>

        <!-- Current path -->
        <p class="text-accent-secondary font-mono text-sm mb-4 truncate" :title="dirBrowser.current" x-text="dirBrowser.current || 'Loading...'"></p>

        <!-- Loading -->
        <div x-show="dirBrowser.loading" class="text-center py-8 text-foreground-secondary">Loading...</div>

        <!-- Directory list -->
        <div x-show="!dirBrowser.loading" class="max-h-[300px] overflow-y-auto mb-4 border border-border rounded">
            <!-- Parent directory -->
            <template x-if="dirBrowser.parent !== null">
                <button @click="browseTo(dirBrowser.parent)" class="w-full flex items-center gap-2 px-3 py-2 text-left text-foreground hover:bg-surface cursor-pointer border-b border-border">
                    {% include 'icons/chevron-right.html' with class='w-4 h-4 rotate-180' %}
                    <span class="text-sm font-mono">..</span>
                </button>
            </template>

            <!-- Subdirectories -->
            <template x-for="dir in dirBrowser.dirs" :key="dir.path">
                <button @click="browseTo(dir.path)" class="w-full flex items-center gap-2 px-3 py-2 text-left text-foreground hover:bg-surface cursor-pointer border-b border-border last:border-b-0">
                    {% include 'icons/folder.html' with class='w-4 h-4 text-foreground-secondary' %}
                    <span class="text-sm font-mono" x-text="dir.name"></span>
                </button>
            </template>

            <p x-show="dirBrowser.dirs.length === 0 && dirBrowser.parent === null" class="text-border italic text-center py-5 text-sm">No subdirectories found.</p>
        </div>

        <!-- Context files in this directory -->
        <div x-show="dirBrowser.contextFiles.length > 0" class="mb-4">
            <p class="text-xs text-success mb-2">{% include 'icons/check-circle.html' with class='w-4 h-4 inline' %} Found <span x-text="dirBrowser.contextFiles.length"></span> file<span x-show="dirBrowser.contextFiles.length !== 1">s</span>:</p>
            <div class="max-h-[120px] overflow-y-auto border border-border rounded bg-surface px-3">
                <template x-for="file in dirBrowser.contextFiles" :key="file">
                    <div class="flex items-center gap-2 py-1.5 border-b border-border last:border-b-0 text-sm text-foreground-secondary font-mono" x-text="file"></div>
                </template>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-xs text-foreground-secondary cursor-pointer">
                <input type="checkbox" :checked="dirBrowser.showHidden" @change="toggleHidden()" class="rounded">
                Show hidden
            </label>
            <div class="flex gap-3">
                <button @click="dirBrowser.show = false" class="px-4 py-2 bg-border text-foreground rounded font-medium text-sm cursor-pointer hover:bg-accent hover:text-foreground-on-accent">Cancel</button>
                <button @click="selectBrowserDir()" :disabled="!dirBrowser.hasContextFiles" class="px-4 py-2 bg-accent text-foreground-on-accent rounded font-medium text-sm hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed">Select</button>
            </div>
        </div>
    </div>
</div>
