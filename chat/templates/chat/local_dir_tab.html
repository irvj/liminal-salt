<!-- Local Directory Tab (shared partial for context file modals) -->
<!-- Add Directory -->
<div class="flex gap-2 mb-4">
    <input type="text" x-model="newDirPath" @keydown.enter.prevent="addDirectory()"
           placeholder="/path/to/directory"
           class="flex-1 p-2.5 border border-border rounded bg-surface text-foreground text-sm font-mono focus:outline-none focus:border-accent-secondary">
    <button @click="openBrowser()" class="px-3 py-2.5 bg-border text-foreground rounded font-medium text-sm cursor-pointer hover:bg-accent hover:text-foreground-on-accent shrink-0" title="Browse folders">{% include 'icons/folder.html' with class='w-4 h-4' %}</button>
    <button @click="addDirectory()" class="px-4 py-2.5 bg-accent text-foreground-on-accent rounded font-medium text-sm cursor-pointer hover:bg-accent-hover shrink-0">Add</button>
</div>

<!-- Directory List -->
<div class="max-h-[300px] overflow-y-auto mb-5">
    <template x-for="dir in localDirectories" :key="dir.path">
        <div class="mb-3 border border-border rounded-lg overflow-hidden">
            <!-- Directory Header -->
            <div class="flex items-center gap-2 px-3 py-2 bg-surface-elevated">
                <span class="flex-1 text-foreground text-xs font-mono truncate" :title="dir.path" x-text="dir.path"></span>
                <template x-if="!dir.exists">
                    <span class="text-xs text-warning shrink-0">Missing</span>
                </template>
                <button @click="refreshDirectory(dir.path)" class="text-foreground-secondary hover:text-accent cursor-pointer p-0.5" title="Refresh">{% include 'icons/check-circle.html' with class='w-4 h-4' %}</button>
                <button @click="removeDirectory(dir.path)" class="text-danger hover:text-warning cursor-pointer p-0.5" title="Remove">{% include 'icons/x.html' with class='w-4 h-4' %}</button>
            </div>
            <!-- Files in Directory -->
            <div class="px-3">
                <template x-for="file in dir.files" :key="dir.path + '/' + file.name">
                    <div class="flex items-center gap-3 py-2 border-b border-surface last:border-b-0">
                        <label class="relative w-11 h-6 shrink-0">
                            <input type="checkbox" :checked="file.enabled" @change="toggleLocalFile(dir.path, file.name)" class="opacity-0 w-0 h-0 peer">
                            <span class="absolute cursor-pointer inset-0 bg-surface-elevated rounded-full transition-colors peer-checked:bg-accent before:absolute before:content-[''] before:h-[18px] before:w-[18px] before:left-[3px] before:bottom-[3px] before:bg-foreground-secondary before:rounded-full before:transition-transform peer-checked:before:translate-x-5"></span>
                        </label>
                        <span class="flex-1 text-foreground text-sm cursor-pointer hover:text-accent-secondary" :class="{ 'line-through text-foreground-muted': !file.exists }" x-text="file.name" @click="file.exists && viewLocalFile(dir.path, file.name)"></span>
                        <template x-if="!file.exists">
                            <span class="text-xs text-warning">Missing</span>
                        </template>
                    </div>
                </template>
                <p x-show="dir.files.length === 0" class="text-border italic text-center py-3 text-sm">No .md or .txt files found.</p>
            </div>
        </div>
    </template>
    <p x-show="localDirectories.length === 0" class="text-border italic text-center py-5">No local directories added.</p>
</div>
